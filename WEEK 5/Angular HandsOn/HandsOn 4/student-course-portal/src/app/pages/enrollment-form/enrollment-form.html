<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">
<div *ngIf="submitted">
  Enrollment request submitted successfully!
</div>
 <label>Student Name:</label>
<input
  type="text"
  name="studentName"
  [(ngModel)]="studentName"
  required
  minlength="3"
  #nameCtrl="ngModel"
>

<span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">
  Name is required
</span>

<span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">
  Name must be at least 3 characters
</span>

  <br><br>


  <label>Student Email:</label>
  <input
    type="email"
    name="studentEmail"
    [(ngModel)]="studentEmail"
  >

  <br><br>

  <label>Course ID:</label>
  <input
  type="number"
  name="courseId"
  [(ngModel)]="courseId"
  required
>

  <br><br>

  <label>Preferred Semester:</label>
  <select
    name="preferredSemester"
    [(ngModel)]="preferredSemester"
  >
    <option value="Odd">Odd</option>
    <option value="Even">Even</option>
  </select>

  <br><br>

  <label>
    <input
  type="checkbox"
  name="agreeToTerms"
  [(ngModel)]="agreeToTerms"
  required
>
    Agree to Terms
  </label>
<br><br>

<button type="submit" [disabled]="enrollForm.invalid">
  Submit
</button>
<button type="button" (click)="enrollForm.resetForm()">
  Reset
</button>
</form>
