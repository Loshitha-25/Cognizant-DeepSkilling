<div>
  <!-- Interpolation: component data is displayed in the DOM -->
  <h1>{{ portalName }}</h1>

  <p>
    Explore available courses, manage your enrollments, and track your academic progress.
  </p>

  <div>
    <p><strong>Courses Available:</strong> {{ coursesAvailable }}</p>
    <p><strong>Enrolled:</strong> 3</p>
    <p><strong>GPA:</strong> 3.8</p>
  </div>

  <!--
    [property] is one-way binding: Component → DOM.
    [(ngModel)] is two-way binding: Component ↔ DOM.
  -->

  <button
    [disabled]="!isPortalActive"
    (click)="onEnrollClick()">
    Enroll Now
  </button>

  <p>{{ message }}</p>

  <br>

  <label for="search">Search Courses: </label>

  <input
    id="search"
    type="text"
    [(ngModel)]="searchTerm"
    placeholder="Enter course name">

  <p>Searching for: {{ searchTerm }}</p>
</div>
<app-course-summary-widget></app-course-summary-widget>
