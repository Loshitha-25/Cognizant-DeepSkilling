<div
  [ngClass]="cardClasses"
  [ngStyle]="{ 'border-left-color': borderColor }"
>
  <h2>{{ course.name }}</h2>

  <p><strong>ID:</strong> {{ course.id }}</p>
  <p><strong>Code:</strong> {{ course.code }}</p>
  <p><strong>Credits:</strong> {{ course.credits | creditLabel }}</p>
  <button (click)="onEnroll()">
  {{ (enrolledIds$ | async)?.includes(course.id) ? 'Unenroll' : 'Enroll' }}
</button>

  <button (click)="toggleDetails()">
    {{ isExpanded ? 'Hide Details' : 'Show Details' }}
  </button>

  <div *ngIf="isExpanded">
    <p>Grade Status: {{ course.gradeStatus }}</p>
  </div>

  <div [ngSwitch]="course.gradeStatus">
    <span *ngSwitchCase="'passed'">Passed</span>
    <span *ngSwitchCase="'failed'">Failed</span>
    <span *ngSwitchDefault>Pending</span>
  </div>

  <hr>
</div>
